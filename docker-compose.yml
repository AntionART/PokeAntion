version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon
      POSTGRES_DB: pokemon_online
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HTTP_PORT=8080
      - DATABASE_URL=postgres://pokemon:pokemon@postgres:5432/pokemon_online?sslmode=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=dev-secret-change-me

volumes:
  pgdata:
